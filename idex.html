<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Chat Bot</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.chat{
    width:350px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
    overflow:hidden;
}
.header{
    background:#4CAF50;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}
.messages{
    height:400px;
    overflow-y:auto;
    padding:10px;
}
.msg{
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}
.user{
    background:#DCF8C6;
    text-align:right;
}
.bot{
    background:#eee;
}
.input{
    display:flex;
}
input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}
button{
    width:80px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="chat">
<div class="header">🤖 Smart Chat Bot</div>

<div class="messages" id="chat">
<div class="msg bot">
Hello! Ask me anything.
</div>
</div>

<div class="input">
<input type="text" id="text" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function botReply(msg){

msg=msg.toLowerCase();

if(msg.includes("hello")||msg.includes("hi"))
return "Hello! 👋";

if(msg.includes("how are you"))
return "I'm fine. Thanks for asking.";

if(msg.includes("your name"))
return "My name is Smart Bot.";

if(msg.includes("time"))
return "Current Time: "+new Date().toLocaleTimeString();

if(msg.includes("date"))
return "Today's Date: "+new Date().toLocaleDateString();

if(msg.includes("bye"))
return "Good Bye! 😊";

if(msg.includes("thank"))
return "You're welcome!";

return "Sorry, I don't understand. Please ask another question.";
}

function send(){

let input=document.getElementById("text");
let text=input.value.trim();

if(text=="") return;

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="msg user">${text}</div>`;

let reply=botReply(text);

setTimeout(()=>{
chat.innerHTML+=`<div class="msg bot">${reply}</div>`;
chat.scrollTop=chat.scrollHeight;
},500);

input.value="";
chat.scrollTop=chat.scrollHeight;

}

document.getElementById("text").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
